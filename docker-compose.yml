version: '3.9'

services:
  mongodb:
    image: mongo:8

    container_name: vedaai-mongodb

    restart: unless-stopped

    ports:
      - '27017:27017'

    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine

    container_name: vedaai-redis

    restart: unless-stopped

    ports:
      - '6379:6379'

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes

volumes:
  mongodb_data:
  redis_data:
